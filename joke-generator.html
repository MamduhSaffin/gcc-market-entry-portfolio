<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="joke-style.css">
</head>
<body>
    <div class="container">
        <div class="joke-generator">
            <h1>😂 Random Joke Generator</h1>
            <p class="subtitle">Get a laugh with a random joke!</p>
            
            <div class="joke-display">
                <div id="jokeContent" class="joke-content">
                    <p id="jokeText" class="loading">Loading a joke...</p>
                </div>
            </div>

            <div class="button-group">
                <button id="getJokeBtn" class="btn btn-primary" onclick="getRandomJoke()">Get Another Joke 🎭</button>
                <button id="copyBtn" class="btn btn-secondary" onclick="copyToClipboard()">Copy Joke 📋</button>
            </div>

            <div class="filter-section">
                <h3>Filter by Category:</h3>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="getJokeByCategory('general')">General</button>
                    <button class="filter-btn" onclick="getJokeByCategory('programming')">Programming</button>
                    <button class="filter-btn" onclick="getJokeByCategory('knock-knock')">Knock Knock</button>
                    <button class="filter-btn" onclick="getJokeByCategory('any')">Any Category</button>
                </div>
            </div>

            <div class="joke-counter">
                <p>Jokes fetched: <span id="jokeCount">0</span></p>
            </div>
        </div>
    </div>

    <footer>
        <p>Powered by <a href="https://sv443.net/jokeapi/v2/" target="_blank">JokeAPI</a></p>
    </footer>

    <script src="joke-script.js"></script>
</body>
</html>
